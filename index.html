<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timer UX Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app app--choice">
    <header class="header">
      <h1>Timer UX Demo</h1>
      <p class="subtitle">Which experience do you want to try?</p>
    </header>

    <section class="choice-card" aria-label="Choose timer experience">
      <a class="choice-option choice-option--good" href="good.html">
        <span class="choice-label">Good UX</span>
        <span class="choice-desc">Clear controls, presets, progress ring, and sensible feedback</span>
      </a>
      <a class="choice-option choice-option--bad" href="bad.html">
        <span class="choice-label">Bad UX</span>
        <span class="choice-desc">Extra steps, confirm dialogs, and a raw seconds readout</span>
      </a>
    </section>
  </main>
</body>
</html>
